# dataset
data_root: /root/autodl-tmp/
dataset: web-bird
n_classes: 200
rescale_size: 448
crop_size: 448

# network & optimization
arch: resnet50
opt: sgd
batch_size: 56
epochs: 120
lr: 0.00875
lr_decay: cosine:10
warmup_epochs: 5
warmup_lr: 0.00875
warmup_lr_plan: constant
weight_decay: 1.0e-5
use_fp16: true

# hyper-params
eps: 0.3
alpha: 0.3
beta: 0.8
gamma: 0.001
delta: 0.0
fdim: 256
hdim: 2
queue_length: 32000
knet_m: 0.99
n_neighbors: 10
topK: 10
topK_decay: 1000
tau_m: 0.98
transform: strong
cls4ood: nl
cls4id: ce
ncr_lossfunc: kldiv
integrate_mode: or
ood_criterion: div
threshold_generator: per_class_mean
conf_weight: true

# A1 shared local evidence settings
local_evidence: false
local_evidence_every: 5
local_evidence_max_batches: 20
local_evidence_cam_quantile: 0.85
local_evidence_use_teacher: true
local_evidence_min_area: 0.05
local_evidence_max_area: 0.45
local_evidence_bbox_padding: 0.02
local_evidence_cam_type: weightcam
local_evidence_save_images: false
local_evidence_image_max_samples: 8

# Shared C1 evidence gate parameters. F1 uses the gate without enabling part CE.
part_ce: false
part_ce_weight: 0.5
part_ce_groups: clean
part_ce_use_teacher_cam: true
part_ce_log: true
part_ce_gate: true
part_ce_gate_type: percentile
part_ce_gate_threshold: 0.10
part_ce_gate_keep_ratio: 0.50
part_ce_gate_start_epoch: 20

# F1 global-to-part KL consistency
part_consistency: true
part_consistency_groups: clean
part_consistency_require_c1_gate: true
part_consistency_start_epoch: 20
part_consistency_weight: 0.05
part_consistency_type: kl_global_to_part
part_consistency_temp: 2.0
part_consistency_use_teacher_global: true
part_consistency_stopgrad_global: true
part_consistency_log: true

# Keep other experimental branches off for attribution.
local_margin: false
evidence_clean_reweight: false
id_candidate: false
multi_part: false
d2_diag: false

# logging
log_root: ./results/
log_proj: benchmark_webfg
log_name: F1_global_to_part_consistency_w005_T2
