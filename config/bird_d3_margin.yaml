# dataset
data_root: /root/autodl-tmp/
dataset: web-bird
n_classes: 200
rescale_size: 448
crop_size: 448

# network & optimization
arch: resnet50
opt: sgd
batch_size: 56
epochs: 120
lr: 0.00875
lr_decay: cosine:10
warmup_epochs: 5
warmup_lr: 0.00875
warmup_lr_plan: constant
weight_decay: 1.0e-5
use_fp16: true

# hyper-params
eps: 0.3
alpha: 0.3
beta: 0.8
gamma: 0.001
fdim: 256
queue_length: 32000
n_neighbors: 10
topK: 10
tau_m: 0.98

# A1 shared local evidence settings
local_evidence: false
local_evidence_every: 5
local_evidence_max_batches: 20
local_evidence_cam_quantile: 0.85
local_evidence_use_teacher: true
local_evidence_min_area: 0.05
local_evidence_max_area: 0.45
local_evidence_bbox_padding: 0.02
local_evidence_cam_type: weightcam
local_evidence_save_images: false
local_evidence_image_max_samples: 8

# C1 gate is kept on so D3 can reuse the exact C1 actual gate mask.
part_ce: false
part_ce_weight: 0.5
part_ce_groups: clean
part_ce_use_teacher_cam: true
part_ce_log: true
part_ce_gate: true
part_ce_gate_type: percentile
part_ce_gate_threshold: 0.10
part_ce_gate_keep_ratio: 0.50
part_ce_gate_start_epoch: 20

# D3 replace-CE local margin
local_margin: true
local_margin_groups: clean
local_margin_require_c1_gate: true
local_margin_start_epoch: 20
local_margin_weight: 0.05
local_margin_margin: 0.5
local_margin_hard_negative: max_non_target
local_margin_use_logits: true
local_margin_log: true

# C2/D1/D2 are off for the first clean D3 attribution run.
id_candidate: false
multi_part: false
d2_diag: false

# logging
log_root: ./results/
log_proj: ''
log_name: D3_margin_replaceCE_w005_m05
