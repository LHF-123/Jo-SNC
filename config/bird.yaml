# dataset
data_root: /root/autodl-tmp/
dataset: web-bird
n_classes: 200
rescale_size: 448
crop_size: 448

# network & optimization
arch: resnet50
opt: sgd
batch_size: 56
epochs: 120
lr: 0.00875
lr_decay: cosine:10
warmup_epochs: 5
warmup_lr: 0.00875
warmup_lr_plan: constant
weight_decay: 1.0e-5
use_fp16: True

# hyper-params
eps: 0.3
alpha: 0.3
beta: 0.8
gamma: 0.001
fdim: 256
queue_length: 32000
n_neighbors: 10
topK: 10
tau_m: 0.98
# Warmup omega_tau is fixed to 0.75 in main.py.

# A1
local_evidence: false
local_evidence_every: 5
local_evidence_max_batches: 20
local_evidence_cam_quantile: 0.85
local_evidence_use_teacher: true
local_evidence_min_area: 0.05
local_evidence_max_area: 0.45
local_evidence_bbox_padding: 0.02
local_evidence_cam_type: weightcam
local_evidence_save_images: false
local_evidence_image_max_samples: 8

# B1/C1 shared
part_ce: true
part_ce_weight: 0.5
part_ce_groups: clean
part_ce_use_teacher_cam: true
part_ce_log: true

# C1 gate
part_ce_gate: true
part_ce_gate_type: percentile
part_ce_gate_threshold: 0.10
part_ce_gate_keep_ratio: 0.50
part_ce_gate_start_epoch: 20

# C2-v4 ID noisy candidate capped soft target
# 使用 teacher top1 生成单个 CAM，再用 p_ori + p_part - p_erase 对所有类别打分取 TopK。
# 候选集合强制并入 noisy label；capped_soft 在集合内限制 candidate top1 独占。
# v4 从后期线性衰减 C2 权重，并跳过 teacher 原图 top1 过强的 ID 样本，减少后期自训练牵引。
# C2 独立于 part_ce_groups；clean 局部 CE 仍只由 C1 的 part_ce_groups: clean 控制。
# D1 诊断阶段关闭 C2，避免 ID candidate 分支扰动多部位证据判断。
id_candidate: false
id_candidate_weight: 0.1
id_candidate_topk: 5
id_candidate_start_epoch: 40
id_candidate_log: true
id_candidate_cam_target: teacher_top1
id_candidate_score_type: ori_part_minus_erase
id_candidate_include_noisy_label: true
id_candidate_entropy_weight: 0.0
id_candidate_entropy_min_ratio: 0.50

id_candidate_loss_type: capped_soft
id_candidate_dist_weight: 0.5
id_candidate_target_temp: 2.0
id_candidate_top1_cap: 0.5
id_candidate_noisy_prior: 0.05

id_candidate_decay_start_epoch: 80
id_candidate_decay_end_epoch: 120
id_candidate_min_weight: 0.01
id_candidate_max_top1_prob: 0.7

# D1：只做多部位生成与诊断，不加 loss，不做 logits 聚合。
multi_part: true
multi_part_log: true
multi_part_num_parts: 3
multi_part_groups: clean,id
multi_part_start_epoch: 40
multi_part_every: 1
multi_part_max_batches: 20
multi_part_use_teacher: true
multi_part_use_accum_erase: true
multi_part_crop_mode: peak_window
multi_part_window_ratio: 0.35
multi_part_erase_mode: peak_window
multi_part_save_images: true
multi_part_image_max_samples: 32
multi_part_image_samples_per_class: 1

# D2_diag：只做 global logits 与过滤后 part logits 的即时诊断，不加 loss。
d2_diag: true
d2_diag_log: true
d2_diag_groups: clean
d2_diag_require_c1_gate: true
d2_diag_start_epoch: 46
d2_diag_every: 1
d2_diag_max_batches: 0
d2_diag_aggregation:
  - top1_valid
  - weighted_valid
d2_diag_weights:
  - 0.05
  - 0.1
  - 0.2
d2_diag_use_teacher_for_quality: true
d2_diag_use_student_for_logits: true
multi_part_quality_metric: p_target_x_marginal_drop
multi_part_quality_gate_type: per_part_percentile
multi_part_quality_keep_ratio: 0.5
multi_part_iou_filter: true
multi_part_iou_thr: 0.5

# logging
log_root: ./results/
log_proj: ''
log_name: D2_diag_C1_multi_part
